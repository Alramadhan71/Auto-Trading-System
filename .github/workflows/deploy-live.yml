name: Deploy Live

on:
  workflow_dispatch:

concurrency:
  group: trading71-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
      SECRETS_MASTER_KEY: ${{ secrets.SECRETS_MASTER_KEY }}
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      VPS_SSH_KEY_B64: ${{ secrets.VPS_SSH_KEY_B64 }}
      VPS_USER: ${{ secrets.VPS_USER }}
      PUBLIC_TELEGRAM_BOT_TOKEN: ${{ secrets.PUBLIC_TELEGRAM_BOT_TOKEN }}
      PUBLIC_TELEGRAM_CHAT_ID: ${{ secrets.PUBLIC_TELEGRAM_CHAT_ID }}
      PUBLIC_TELEGRAM_INVITE_URL: ${{ secrets.PUBLIC_TELEGRAM_INVITE_URL }}
      PUBLIC_TELEGRAM_BOT_USERNAME: ${{ secrets.PUBLIC_TELEGRAM_BOT_USERNAME }}
      PRIVATE_TELEGRAM_BOT_TOKEN: ${{ secrets.PRIVATE_TELEGRAM_BOT_TOKEN }}
      PRIVATE_TELEGRAM_BOT_USERNAME: ${{ secrets.PRIVATE_TELEGRAM_BOT_USERNAME }}
      GLASSNODE_API_KEY: ${{ secrets.GLASSNODE_API_KEY }}
      SAHMK_API_KEY: ${{ secrets.SAHMK_API_KEY }}
      SAHMK_CACHE_MS: 5000
      RESET_ADMIN_PASSWORD: 'false'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate deployment secrets
        run: |
          set -euo pipefail
          missing=0
          for name in VPS_HOST VPS_SSH_KEY_B64 VPS_USER; do
            if [ -z "${!name:-}" ]; then
              echo "::error title=Missing GitHub Secret::$name is required for deployment."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          PORT="${VPS_PORT:-22}"
          if [[ "$VPS_HOST" =~ ^https?:// ]] || [[ "$VPS_HOST" == */* ]] || [[ "$VPS_HOST" =~ [[:space:]] ]]; then
            echo "::error title=Invalid VPS_HOST::Use only the server IP or domain name. Do not include http://, https://, slashes, paths, or spaces."
            exit 1
          fi
          if ! [[ "$PORT" =~ ^[0-9]+$ ]] || [ "$PORT" -lt 1 ] || [ "$PORT" -gt 65535 ]; then
            echo "::error title=Invalid VPS_PORT::VPS_PORT must be a TCP port number between 1 and 65535. Use 22 unless the server SSH port was intentionally changed."
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare SSH
        run: |
          set -euo pipefail
          : "${VPS_HOST:?VPS_HOST secret is required}"
          : "${VPS_USER:?VPS_USER secret is required}"
          : "${VPS_SSH_KEY_B64:?VPS_SSH_KEY_B64 secret is required}"
          PORT="${VPS_PORT:-22}"
          mkdir -p ~/.ssh
          printf '%s' "$VPS_SSH_KEY_B64" | base64 -d > ~/.ssh/trading71_vps
          chmod 600 ~/.ssh/trading71_vps
          if ! ssh-keygen -y -f ~/.ssh/trading71_vps >/dev/null 2>&1; then
            echo "::error title=Invalid VPS_SSH_KEY_B64::The decoded SSH private key is invalid or passphrase-protected. Store the base64 of an unencrypted private key that is authorized on the VPS."
            exit 1
          fi
          touch ~/.ssh/known_hosts
          keyscan_output="$(mktemp)"
          for attempt in 1 2 3 4 5; do
            if ssh-keyscan -T 20 -p "$PORT" -H "$VPS_HOST" > "$keyscan_output" 2>/tmp/ssh-keyscan.err && [ -s "$keyscan_output" ]; then
              cat "$keyscan_output" >> ~/.ssh/known_hosts
              break
            fi
            echo "ssh-keyscan failed on attempt $attempt; retrying..."
            sleep 5
          done
          if [ ! -s "$keyscan_output" ]; then
            if [ "$PORT" = "22" ] && { [ "$VPS_HOST" = "trading71.uk" ] || [ "$VPS_HOST" = "72.61.192.179" ]; }; then
              cat >> ~/.ssh/known_hosts <<'KNOWN_HOSTS'
trading71.uk ssh-rsa 
trading71.uk ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBHXwT0upVQ/nn6alKo/o74epkn8KyU+1LcgffVVwiP+BcCUv84tpobm6W8Ta2G3YFaTgwaB2VfnL3XiYOwR1lrQ=
trading71.uk ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIF07CzaN/UWe2h5vcDhfIp7mN3Gkkd4RpqsxAA/vkPfY
72.61.192.179 ssh-rsa 
72.61.192.179 ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBHXwT0upVQ/nn6alKo/o74epkn8KyU+1LcgffVVwiP+BcCUv84tpobm6W8Ta2G3YFaTgwaB2VfnL3XiYOwR1lrQ=
72.61.192.179 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIF07CzaN/UWe2h5vcDhfIp7mN3Gkkd4RpqsxAA/vkPfY
KNOWN_HOSTS
            else
              getent ahosts "$VPS_HOST" || true
              echo "::error title=VPS SSH is unreachable::Unable to read the SSH host key from VPS_HOST on port $PORT. Fix VPS_HOST/VPS_PORT, open the SSH port in the VPS firewall/security group, and make sure sshd is running."
              exit 1
            fi
          fi
          if ! ssh -p "$PORT" -i ~/.ssh/trading71_vps -o BatchMode=yes -o ConnectTimeout=20 -o StrictHostKeyChecking=yes -o ServerAliveInterval=20 -o ServerAliveCountMax=3 "$VPS_USER@$VPS_HOST" "echo ssh-ready" >/dev/null; then
            echo "::error title=VPS SSH login failed::The server is reachable, but login failed. Check VPS_USER and confirm the public key for VPS_SSH_KEY_B64 is in ~/.ssh/authorized_keys on the VPS."
            exit 1
          fi

      - name: Deploy on VPS
        run: |
          set -euo pipefail
          PORT="${VPS_PORT:-22}"
          ADMIN_USERNAME="${ADMIN_USERNAME:-admin}"
          if [ "$RESET_ADMIN_PASSWORD" = "true" ]; then
            : "${ADMIN_PASSWORD:?ADMIN_PASSWORD secret is required when reset_admin_password is true}"
          fi
          ADMIN_PASSWORD_B64="$(printf '%s' "${ADMIN_PASSWORD:-}" | base64 -w0)"
          ADMIN_USERNAME_B64="$(printf '%s' "$ADMIN_USERNAME" | base64 -w0)"
          SECRETS_MASTER_KEY_B64="$(printf '%s' "${SECRETS_MASTER_KEY:-}" | base64 -w0)"
          PUBLIC_TELEGRAM_BOT_TOKEN_B64="$(printf '%s' "${PUBLIC_TELEGRAM_BOT_TOKEN:-}" | base64 -w0)"
          PUBLIC_TELEGRAM_CHAT_ID_B64="$(printf '%s' "${PUBLIC_TELEGRAM_CHAT_ID:-}" | base64 -w0)"
          PUBLIC_TELEGRAM_INVITE_URL_B64="$(printf '%s' "${PUBLIC_TELEGRAM_INVITE_URL:-}" | base64 -w0)"
          PUBLIC_TELEGRAM_BOT_USERNAME_B64="$(printf '%s' "${PUBLIC_TELEGRAM_BOT_USERNAME:-}" | base64 -w0)"
          PRIVATE_TELEGRAM_BOT_TOKEN_B64="$(printf '%s' "${PRIVATE_TELEGRAM_BOT_TOKEN:-}" | base64 -w0)"
          PRIVATE_TELEGRAM_BOT_USERNAME_B64="$(printf '%s' "${PRIVATE_TELEGRAM_BOT_USERNAME:-}" | base64 -w0)"
          GLASSNODE_API_KEY_B64="$(printf '%s' "${GLASSNODE_API_KEY:-}" | base64 -w0)"
          SAHMK_API_KEY_B64="$(printf '%s' "${SAHMK_API_KEY:-}" | base64 -w0)"
          SAHMK_CACHE_MS_B64="$(printf '%s' "${SAHMK_CACHE_MS:-5000}" | base64 -w0)"
          ssh -p "$PORT" -i ~/.ssh/trading71_vps -o BatchMode=yes -o StrictHostKeyChecking=yes -o ServerAliveInterval=20 -o ServerAliveCountMax=3 "$VPS_USER@$VPS_HOST" \
            "ADMIN_PASSWORD_B64='$ADMIN_PASSWORD_B64' ADMIN_USERNAME_B64='$ADMIN_USERNAME_B64' SECRETS_MASTER_KEY_B64='$SECRETS_MASTER_KEY_B64' PUBLIC_TELEGRAM_BOT_TOKEN_B64='$PUBLIC_TELEGRAM_BOT_TOKEN_B64' PUBLIC_TELEGRAM_CHAT_ID_B64='$PUBLIC_TELEGRAM_CHAT_ID_B64' PUBLIC_TELEGRAM_INVITE_URL_B64='$PUBLIC_TELEGRAM_INVITE_URL_B64' PUBLIC_TELEGRAM_BOT_USERNAME_B64='$PUBLIC_TELEGRAM_BOT_USERNAME_B64' PRIVATE_TELEGRAM_BOT_TOKEN_B64='$PRIVATE_TELEGRAM_BOT_TOKEN_B64' PRIVATE_TELEGRAM_BOT_USERNAME_B64='$PRIVATE_TELEGRAM_BOT_USERNAME_B64' GLASSNODE_API_KEY_B64='$GLASSNODE_API_KEY_B64' SAHMK_API_KEY_B64='$SAHMK_API_KEY_B64' SAHMK_CACHE_MS_B64='$SAHMK_CACHE_MS_B64' bash -s" <<'EOF'
          set -euo pipefail
          cd /opt/trading71
          git pull --ff-only
          ADMIN_PASSWORD="$(printf '%s' "$ADMIN_PASSWORD_B64" | base64 -d)"
          ADMIN_USERNAME="$(printf '%s' "$ADMIN_USERNAME_B64" | base64 -d)"
          touch .env
          CURRENT_ADMIN_PASSWORD="$(grep -m1 '^ADMIN_PASSWORD=' .env | cut -d= -f2- || true)"
          if [ -z "$ADMIN_PASSWORD" ]; then
            if [ -z "$CURRENT_ADMIN_PASSWORD" ]; then
              echo "ADMIN_PASSWORD is missing and no existing server password was found." >&2
              exit 1
            else
              ADMIN_PASSWORD="$CURRENT_ADMIN_PASSWORD"
            fi
          fi
          tmp_env="$(mktemp)"
          if [ -n "$SECRETS_MASTER_KEY_B64" ]; then
            SECRETS_MASTER_KEY="$(printf '%s' "$SECRETS_MASTER_KEY_B64" | base64 -d)"
            grep -v -E '^(ADMIN_PASSWORD|ADMIN_USERNAME|SECRETS_MASTER_KEY|PUBLIC_TELEGRAM_BOT_TOKEN|PUBLIC_TELEGRAM_CHAT_ID|PUBLIC_TELEGRAM_INVITE_URL|PUBLIC_TELEGRAM_BOT_USERNAME|PRIVATE_TELEGRAM_BOT_TOKEN|PRIVATE_TELEGRAM_BOT_USERNAME|GLASSNODE_API_KEY|SAHMK_API_KEY|SAHMK_CACHE_MS)=' .env > "$tmp_env" || true
          else
            grep -v -E '^(ADMIN_PASSWORD|ADMIN_USERNAME|PUBLIC_TELEGRAM_BOT_TOKEN|PUBLIC_TELEGRAM_CHAT_ID|PUBLIC_TELEGRAM_INVITE_URL|PUBLIC_TELEGRAM_BOT_USERNAME|PRIVATE_TELEGRAM_BOT_TOKEN|PRIVATE_TELEGRAM_BOT_USERNAME|GLASSNODE_API_KEY|SAHMK_API_KEY|SAHMK_CACHE_MS)=' .env > "$tmp_env" || true
          fi
          printf 'ADMIN_USERNAME=%s\n' "$ADMIN_USERNAME" >> "$tmp_env"
          printf 'ADMIN_PASSWORD=%s\n' "$ADMIN_PASSWORD" >> "$tmp_env"
          if [ -n "${SECRETS_MASTER_KEY:-}" ]; then
            printf 'SECRETS_MASTER_KEY=%s\n' "$SECRETS_MASTER_KEY" >> "$tmp_env"
          fi
          for encoded_name in \
            PUBLIC_TELEGRAM_BOT_TOKEN_B64 \
            PUBLIC_TELEGRAM_CHAT_ID_B64 \
            PUBLIC_TELEGRAM_INVITE_URL_B64 \
            PUBLIC_TELEGRAM_BOT_USERNAME_B64 \
            PRIVATE_TELEGRAM_BOT_TOKEN_B64 \
            PRIVATE_TELEGRAM_BOT_USERNAME_B64 \
            GLASSNODE_API_KEY_B64 \
            SAHMK_API_KEY_B64 \
            SAHMK_CACHE_MS_B64
          do
            encoded_value="${!encoded_name}"
            if [ -n "$encoded_value" ]; then
              plain_name="${encoded_name%_B64}"
              plain_value="$(printf '%s' "$encoded_value" | base64 -d)"
              printf '%s=%s\n' "$plain_name" "$plain_value" >> "$tmp_env"
            fi
          done
          mv "$tmp_env" .env
          chmod 600 .env
          docker compose -f docker-compose.oracle.yml up -d --build
          docker compose -f docker-compose.oracle.yml ps
          EOF
